# إعدادات قاعدة البيانات (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/order_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# إعدادات الربط مع يوريكا
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# إعدادات الـ Circuit Breaker (Resilience4j)
resilience4j.circuitbreaker.instances.product.sliding-window-size=10
resilience4j.circuitbreaker.instances.product.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.product.wait-duration-in-open-state=10s

# إعدادات التتبع (Zipkin & Micrometer)
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# رسالة اختبار (اختياري)
custom.welcome.message=Hello from GitHub Config Server!
